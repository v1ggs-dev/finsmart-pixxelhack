    <script>

        // --- Authentication & Navigation Guard (Runs immediately) ---
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // --- This runs after the page content is loaded ---
        document.addEventListener('DOMContentLoaded', () => {

            // --- Active Link Highlighting (Automatic) ---
            const currentPage = window.location.pathname.split('/').pop();
            if (currentPage === 'index.html' || currentPage === '') {
                document.getElementById('nav-dashboard')?.classList.add('active');
            } else if (currentPage.startsWith('learn')) { // Handles learn.html, learn_juniors.html, etc.
                document.getElementById('nav-learn')?.classList.add('active');
            } else if (currentPage === 'tools.html') {
                document.getElementById('nav-tools')?.classList.add('active');
            } else if (currentPage === 'challenges.html') {
                document.getElementById('nav-challenges')?.classList.add('active');
            }

            // --- Dynamic "Learn" Link Logic ---
            const userAge = parseInt(sessionStorage.getItem('userAge'), 10);
            const learnLink = document.getElementById('nav-learn');
            if (learnLink) {
                if (userAge >= 12 && userAge < 16) {
                    learnLink.href = 'learn_juniors.html';
                } else if (userAge >= 16 && userAge < 18) {
                    learnLink.href = 'learn_seniors.html';
                } else {
                    learnLink.href = 'learn.html';
                }
            }

            // --- Logout Button Functionality ---
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    sessionStorage.clear();
                    window.location.href = 'login.html';
                });
            }

            // --- Your other page-specific JavaScript can go here ---
            // For example, on challenges.html, the code for rendering challenge cards would follow.
        });
    </script>
    <link rel="stylesheet" href="../css/dashboard-dark.css">

                            </div>
                        </div>
                        <div class="lg:col-span-2">
                            <p class="text-lg text-gray-600 leading-relaxed">${chapter.introduction}</p>
                            <div class="mt-8 bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                                ${accordionHTML}
                            </div>
                             <div class="mt-8 flex justify-between">
                                 <a href="?id=${parseInt(chapterId) - 1}" id="prev-btn" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-300 transition font-semibold flex items-center">
                                     <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                     Previous
                                 </a>
                                 <a href="?id=${parseInt(chapterId) + 1}" id="next-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition font-semibold flex items-center">
                                     Next Chapter
                                     <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                 </a>
                             </div>
                        </div>
                    </div>
                `;

                mainContainer.innerHTML = chapterHTML;

                setupQuizListener(chapter);
                updateNavButtons(chapterId);
            }

            function setupQuizListener(chapter) {
                if (chapter.interactive.type === 'quiz') {
                    const optionsContainer = document.getElementById('quiz-options');
                    const feedbackEl = document.getElementById('quiz-feedback');
                    optionsContainer.addEventListener('change', (e) => {
                        if (e.target.name === 'quiz') {
                            if (e.target.value === chapter.interactive.correctAnswer) {
                                feedbackEl.textContent = "That's correct! Well done.";
                                feedbackEl.className = 'mt-4 text-center font-semibold text-green-600';
                            } else {
                                feedbackEl.textContent = "Not quite, try again!";
                                feedbackEl.className = 'mt-4 text-center font-semibold text-red-600';
                            }
                        }
                    });
                }
            }

            function updateNavButtons(currentId) {
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                const numCurrentId = parseInt(currentId);

                if (!chaptersData[numCurrentId - 1]) {
                    prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    prevBtn.href = '#';
                }
                if (!chaptersData[numCurrentId + 1]) {
                    nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    nextBtn.href = '#';
                }
            }

            renderChapter();
        });
    </script>

</body>

</html>
